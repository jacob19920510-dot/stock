<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MarketView</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand"><div class="logo">↗</div><span>MarketView</span></div>
      <div class="nav"><button class="active">總覽</button><button>自選股</button><button>指數</button><button>期貨</button><button>搜尋</button><button>設定</button></div>
      <div class="side-foot">深色模式<br><span id="sideTime"></span></div>
    </aside>
    <main class="main">
      <div class="topbar"><div><div class="app-title"><svg class="app-logo" viewBox="0 0 48 48" aria-hidden="true"><defs><linearGradient id="mvLogo" x1="8" y1="42" x2="42" y2="6" gradientUnits="userSpaceOnUse"><stop stop-color="#38e083"/><stop offset=".55" stop-color="#5b8cff"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs><rect x="5" y="5" width="38" height="38" rx="11" fill="url(#mvLogo)"/><path d="M14 31.5 21.5 24l5.5 5.5L35 17" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M30 17h5v5" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg><h1>盤勢駕駛艙</h1></div><div class="muted">刷新時間：<span id="refreshTime">-</span>，每 5 秒自動刷新</div></div><div class="search"><select id="market"><option value="tw">台股</option><option value="us">美股</option></select><input id="search" placeholder="輸入代號或名稱" autocomplete="off"><button class="theme-toggle" id="themeButton" type="button" title="切換主題" aria-label="切換主題"><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button><button class="refresh-btn" id="refreshButton" type="button" title="手動刷新" aria-label="手動刷新"><svg class="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg><span>刷新</span></button><div id="suggest" class="suggest"></div></div></div>
      <div class="cards" id="cards"></div>
      <div class="focus-grid"><section class="panel" id="watchPanel"></section></div>
      <div class="bottom-grid"><section class="panel" id="indexPanel"></section><section class="panel" id="futurePanel"></section></div>
    </main>
    <div class="detail-layer" id="detailLayer"><section class="detail" id="detail"></section></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>

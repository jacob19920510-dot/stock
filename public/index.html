<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MarketView</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand"><div class="logo">↗</div><span>MarketView</span></div>
      <div class="nav"><button class="active">總覽</button><button>自選股</button><button>指數</button><button>期貨</button><button>搜尋</button><button>設定</button></div>
      <div class="side-foot">深色模式<br><span id="sideTime"></span></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-brand">
          <div class="app-title">
            <svg class="app-logo" viewBox="0 0 48 48" aria-hidden="true">
              <defs>
                <linearGradient id="mvLogo" x1="8" y1="42" x2="42" y2="6" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#38e083"/>
                  <stop offset=".55" stop-color="#5b8cff"/>
                  <stop offset="1" stop-color="#a78bfa"/>
                </linearGradient>
              </defs>
              <rect x="5" y="5" width="38" height="38" rx="11" fill="url(#mvLogo)"/>
              <path d="M14 31.5 21.5 24l5.5 5.5L35 17" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M30 17h5v5" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="topbar-copy">
              <div class="topbar-title-row">
                <h1>盤勢駕駛艙</h1>
                <span class="topbar-badge">專業版</span>
              </div>
              <div class="topbar-subtitle">市場概覽 · 每 5 秒自動更新</div>
            </div>
          </div>
          <div class="topbar-meta">
            <span class="topbar-badge topbar-badge-soft">即時行情</span>
            <span class="topbar-refresh">刷新時間：<span id="refreshTime">-</span></span>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="search">
            <select id="market">
              <option value="tw">台股</option>
              <option value="us">美股</option>
            </select>
            <div class="search-field">
              <span class="search-icon" aria-hidden="true"></span>
              <input id="search" placeholder="搜尋股票代碼 / 名稱" autocomplete="off">
            </div>
            <button class="theme-toggle" id="themeButton" type="button" title="切換主題" aria-label="切換主題">
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
              <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="refresh-btn" id="refreshButton" type="button" title="手動刷新" aria-label="手動刷新">
              <svg class="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
              <span>刷新</span>
            </button>
            <div id="suggest" class="suggest"></div>
          </div>
        </div>
      </header>
      <section class="panel global-market" aria-labelledby="globalMarketTitle">
        <div class="panel-head global-market-head">
          <div class="section-title">
            <span class="section-title-icon section-title-icon-global" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <path d="M3 12h18"></path>
                <path d="M12 3c2.8 2.7 4.4 5.9 4.4 9s-1.6 6.3-4.4 9c-2.8-2.7-4.4-5.9-4.4-9S9.2 5.7 12 3z"></path>
              </svg>
            </span>
            <h2 id="globalMarketTitle">全球市場</h2>
          </div>
          <div class="global-market-actions"><button class="small-btn" id="globalMarketEditBtn" type="button">編輯</button><button class="small-btn" id="globalMarketDoneBtn" type="button" hidden>完成</button><button class="small-btn" id="globalMarketCancelBtn" type="button" hidden>取消</button></div>
        </div>
        <div class="cards" id="cards"></div>
      </section>
      <section class="panel market-wind" aria-labelledby="marketWindTitle">
        <div class="panel-head">
          <div class="section-title">
            <span class="section-title-icon section-title-icon-wind" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 12h9"></path>
                <path d="M13 12c0-2.8 2.2-5 5-5 1.8 0 3 1.1 3 2.7 0 1.5-1.2 2.3-2.6 2.3H18"></path>
                <path d="M11 6.5 13 4l2 2.5"></path>
                <path d="M11 17.5 13 20l2-2.5"></path>
              </svg>
            </span>
            <h2 id="marketWindTitle">市場風向</h2>
          </div>
        </div>
        <div class="wind-cards" id="windCards"></div>
      </section>
      <div class="focus-grid">
        <section class="panel" id="watchPanel"></section>
      </div>
    </main>
    <div class="detail-layer" id="detailLayer"><section class="detail" id="detail"></section></div>
    <div class="rank-layer" id="rankLayer"><section class="rank-modal" id="rankModal"></section></div>
    <div class="market-layer" id="marketLayer"><section class="market-modal" id="marketModal"></section></div>
    <div class="watchlist-layer" id="watchlistLayer"><section class="watchlist-modal" id="watchlistModal"></section></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
